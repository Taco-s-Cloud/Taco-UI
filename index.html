<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User List</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Existing Users</h1>
        <button id="fetchUsersButton">Show Users</button>
        <div id="usersList"></div>
    </div>

    <script>
        async function fetchUsers() {
            try {
                const response = await fetch('http://localhost:5001/users');
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const users = await response.json();

                const usersList = document.getElementById('usersList');
                usersList.innerHTML = ''; // Clear any existing content

                // Loop through the users and create HTML elements to display them
                users.forEach(user => {
                    const userDiv = document.createElement('div');
                    userDiv.classList.add('user-item');
                    userDiv.innerHTML = `
                        <p><strong>User ID:</strong> ${user.user_id}</p>
                        <p><strong>Email:</strong> ${user.email}</p>
                        <p><strong>Password:</strong> ${user.password}</p>
                        <p><strong>Full Name:</strong> ${user.full_name}</p>
                        <p><strong>Registration Date:</strong> ${new Date(user.registration_date).toLocaleDateString()}</p>
                    `;
                    usersList.appendChild(userDiv);
                });
            } catch (error) {
                console.error('Error fetching users:', error);
            }
        }

        // Add event listener to the button
        document.getElementById('fetchUsersButton').addEventListener('click', fetchUsers);
    </script>
</body>
</html>
